<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思维空间 - 分类管理</title>
  
  <!-- 资源预加载优化 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  
  <!-- 关键CSS内联 -->
  <style>
    /* 关键渲染路径CSS */
    :root {
      --primary-color: #4361ee;
      --secondary-color: #3a0ca3;
      --accent-color: #4cc9f0;
      --text-color: #2b2d42;
      --light-text: #8d99ae;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --sidebar-bg: #2b2d42;
      --sidebar-text: #edf2f4;
      --border-radius: 8px;
      --box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --success-color: #4caf50;
      --warning-color: #ff9800;
      --danger-color: #f44336;
    }
    
    /* 关键布局样式 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
    }
    
    /* 侧边栏基础样式 */
    .admin-sidebar {
      width: 260px;
      background-color: var(--sidebar-bg);
      color: var(--sidebar-text);
      padding: 1.5rem 0;
      height: 100vh;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    
    .admin-main {
      flex: 1;
      padding: 2rem;
      overflow-x: hidden;
    }
    
    /* 加载状态 */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      color: var(--light-text);
    }
    
    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top: 2px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <!-- 非关键资源异步加载 -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap"></noscript>
  
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body>
  <!-- 管理侧边栏 -->
  <aside class="admin-sidebar">
    <div class="admin-logo">思维空间CMS</div>
    <ul class="admin-menu">
        <div class="menu-category">内容管理</div>
                    <li class="menu-item"><a href="{% url 'Pythonfun:article_edit' %}"><i class="fas fa-edit"></i> 文章编辑</a></li>
            <li class="menu-item active"><a href="{% url 'Pythonfun:category_management' %}"><i class="fas fa-folder"></i> 分类管理</a></li>
            <li class="menu-item"><a href="{% url 'Pythonfun:course_management' %}"><i class="fas fa-book"></i> 教程管理</a></li>
            <li class="menu-item"><a href="{% url 'Pythonfun:function_management' %}"><i class="fas fa-code"></i> 函数管理</a></li>
        <div class="menu-category">系统管理</div>
        <li class="menu-item">
          <a href="#"><i class="fas fa-users"></i> 用户管理</a>
        </li>
        <li class="menu-item">
          <a href="#"><i class="fas fa-cog"></i> 系统设置</a>
        </li>
        <div class="menu-category">统计</div>
        <li class="menu-item">
          <a href="#"><i class="fas fa-chart-line"></i> 访问统计</a>
        </li>
        <li class="menu-item">
          <a href="#"><i class="fas fa-comments"></i> 评论管理</a>
        </li>
      </ul>
  </aside>
  <!-- 主内容区 -->
  <main class="admin-main">
    <header class="admin-header">
      <h1 class="page-title">分类管理</h1>
      <div class="user-profile">
        <a href="/login/" style="color: var(--text-color); text-decoration: none;">
          <span>管理员</span>
          <div class="user-avatar">A</div>
        </a>
      </div>
    </header>
    <!-- TBA切换卡片 -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">导航栏管理</h2>
        <div class="tba-toggle-container">
          <span class="tba-label">TBA切换:</span>
          <div class="tba-buttons">
            <button class="tba-btn active" data-type="grammar">
              <i class="fas fa-code"></i> 语法
            </button>
            <button class="tba-btn" data-type="data_structure">
              <i class="fas fa-sitemap"></i> 数据结构
            </button>
            <button class="tba-btn" data-type="ai_programming">
              <i class="fas fa-robot"></i> AI编程
            </button>
            <button class="tba-btn" data-type="project">
              <i class="fas fa-project-diagram"></i> 项目
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- 主分类列表卡片 -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">主分类</h2>
        <button class="btn btn-primary" id="addCategoryBtn">
          <i class="fas fa-plus"></i> 添加主分类
        </button>
      </div>
      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>主分类名称</th>
              <th>别名</th>
              <th>排序</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="mainCategoryTableBody">
            <!-- 主分类数据将通过 JS 动态插入 -->
          </tbody>
        </table>
      </div>
      <div class="pagination-container" id="mainCategoryPagination">
        <!-- 分页控件将通过 JS 动态插入 -->
      </div>
    </div>
    <!-- 子分类管理 -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">子分类管理</h2>
        <button class="btn btn-primary" id="addSubCategoryBtn">
          <i class="fas fa-plus"></i> 添加子分类
        </button>
      </div>
      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>所属主分类</th>
              <th>子分类名称</th>
              <th>别名</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="subCategoryTableBody">
            <!-- 子分类数据将通过 JS 动态插入 -->
          </tbody>
        </table>
      </div>
      <div class="pagination-container" id="subCategoryPagination">
        <!-- 分页控件将通过 JS 动态插入 -->
      </div>
    </div>
  </main>
  <!-- 添加/编辑主分类模态框 -->
  <div class="modal" id="categoryModal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">添加主分类</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="categoryForm" onsubmit="return false;">
          <div class="form-row">
            <div class="form-group">
              <label for="categoryName" class="form-label">主分类名称</label>
              <input type="text" id="categoryName" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="categorySlug" class="form-label">URL别名</label>
              <input type="text" id="categorySlug" class="form-control" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="categoryOrder" class="form-label">排序权重</label>
              <input type="number" id="categoryOrder" class="form-control" value="0">
            </div>
            <div class="form-group">
              <label for="categoryStatus" class="form-label">状态</label>
              <select id="categoryStatus" class="form-control">
                <option value="true">已启用</option>
                <option value="false">未启用</option>
              </select>
            </div>
          </div>
          <input type="hidden" id="categoryId" value="">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveCategoryBtn">保存</button>
      </div>
    </div>
  </div>
  <!-- 添加/编辑子分类模态框 -->
  <div class="modal" id="subCategoryModal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 class="modal-title" id="subModalTitle">添加子分类</h3>
        <button class="modal-close" id="closeSubModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="subCategoryForm" onsubmit="return false;">
          <div class="form-row">
            <div class="form-group">
              <label for="subCategoryName" class="form-label">子分类名称</label>
              <input type="text" id="subCategoryName" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="subCategorySlug" class="form-label">URL别名</label>
              <input type="text" id="subCategorySlug" class="form-control" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="parentCategory" class="form-label">所属主分类</label>
              <select id="parentCategory" class="form-control" required>
                <!-- 选项将由JS动态生成 -->
              </select>
            </div>
            <div class="form-group">
              <label for="subCategoryStatus" class="form-label">状态</label>
              <select id="subCategoryStatus" class="form-control">
                <option value="true">已启用</option>
                <option value="false">未启用</option>
              </select>
            </div>
          </div>
          <input type="hidden" id="subCategoryId" value="">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelSubBtn">取消</button>
        <button class="btn btn-primary" id="saveSubCategoryBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ================= API & 全局变量 =================
    const mainCategoryApiUrl = `/api/main-categories/`;
    const subCategoryApiUrl = `/api/sub-categories/`;
    let mainCategoriesCache = []; // 用于子分类下拉列表
    let currentMainPage = 1;
    let currentSubPage = 1;

    // CSRF Token for Django
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');

    // ================= Toast提示框 =================
    function showToast(message, type = 'success') {
      const toastContainer = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const iconClass = type === 'success' ? 'fa-check-circle' : 'fa-times-circle';
      toast.innerHTML = `<i class="fas ${iconClass} toast-icon"></i> ${message}`;
      
      toastContainer.appendChild(toast);
      
      setTimeout(() => { toast.classList.add('show'); }, 100);

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => { toast.remove(); }, 500);
      }, 3000);
    }

    // ================= 模态框控制 =================
    const categoryModal = document.getElementById('categoryModal');
    const subCategoryModal = document.getElementById('subCategoryModal');
    const addCategoryBtn = document.getElementById('addCategoryBtn');
    const addSubCategoryBtn = document.getElementById('addSubCategoryBtn');

    function setupModal(modal, openBtn, closeBtnId, cancelBtnId, formId, titleId) {
        const closeBtn = document.getElementById(closeBtnId);
        const cancelBtn = document.getElementById(cancelBtnId);
        
        openBtn.addEventListener('click', () => {
            // 重置表单
            document.getElementById(formId).reset();
            
            // 修复：确保清空隐藏的ID字段，避免编辑模式
            if (formId === 'categoryForm') {
                document.getElementById('categoryId').value = '';
                document.getElementById('modalTitle').textContent = '添加主分类';
            } else if (formId === 'subCategoryForm') {
                document.getElementById('subCategoryId').value = '';
                document.getElementById('subModalTitle').textContent = '添加子分类';
                updateParentCategoryOptions();
            }
            
            modal.classList.add('show');
        });

        const closeModal = () => modal.classList.remove('show');
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    }

    setupModal(categoryModal, addCategoryBtn, 'closeModal', 'cancelBtn', 'categoryForm', 'modalTitle');
    setupModal(subCategoryModal, addSubCategoryBtn, 'closeSubModal', 'cancelSubBtn', 'subCategoryForm', 'subModalTitle');

    // ================= 分页渲染 =================
    function renderPagination(container, currentPage, totalPages, onPageClick) {
      container.innerHTML = '';
      if (totalPages <= 1) return;

      const createBtn = (text, page, enabled = true) => {
          const btn = document.createElement('button');
          btn.innerHTML = text;
          btn.classList.add('pagination-btn');
          if (!enabled) btn.classList.add('disabled');
          btn.addEventListener('click', () => { if (enabled) onPageClick(page); });
          return btn;
      }

      container.appendChild(createBtn('&laquo; 上一页', currentPage - 1, currentPage > 1));

      for (let i = 1; i <= totalPages; i++) {
        const pageLink = document.createElement('a');
        pageLink.href = '#';
        pageLink.textContent = i;
        pageLink.classList.add('page-link');
        if (i === currentPage) pageLink.classList.add('active');
        pageLink.addEventListener('click', (e) => { e.preventDefault(); onPageClick(i); });
        container.appendChild(pageLink);
      }

      container.appendChild(createBtn('下一页 &raquo;', currentPage + 1, currentPage < totalPages));
    }

    // ================= 主分类 CRUD =================
    async function fetchMainCategories(page = 1) {
        try {
            const response = await fetch(`${mainCategoryApiUrl}?page=${page}`);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            
            currentMainPage = data.current_page;
            mainCategoriesCache = data.items; // 更新缓存
            const tableBody = document.getElementById('mainCategoryTableBody');
            tableBody.innerHTML = '';

            if(data.items.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">暂无数据</td></tr>`;
            }

            data.items.forEach(cat => {
                const statusBadge = cat.is_enabled ? `<span class="badge badge-success">已启用</span>` : `<span class="badge badge-warning">未启用</span>`;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${cat.id}</td>
                    <td>${cat.name}</td>
                    <td>${cat.slug}</td>
                    <td>${cat.order}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-outline btn-sm" onclick="editCategory(${cat.id})"><i class="fas fa-edit"></i> 编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})"><i class="fas fa-trash-alt"></i> 删除</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            renderPagination(document.getElementById('mainCategoryPagination'), data.current_page, data.total_pages, fetchMainCategories);
        } catch (error) {
            showToast('加载主分类失败', 'danger');
            console.error('Fetch error:', error);
        }
    }

    document.getElementById('saveCategoryBtn').addEventListener('click', async () => {
        const id = document.getElementById('categoryId').value;
        const name = document.getElementById('categoryName').value.trim();
        const slug = document.getElementById('categorySlug').value.trim();
        if (!name || !slug) return showToast('分类名称和别名不能为空!', 'danger');

        const url = id ? `${mainCategoryApiUrl}${id}/` : mainCategoryApiUrl;
        const method = id ? 'PUT' : 'POST';

        const body = JSON.stringify({
            name: name,
            slug: slug,
            order: parseInt(document.getElementById('categoryOrder').value) || 0,
            is_enabled: document.getElementById('categoryStatus').value === 'true'
        });

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                body: body
            });

            if (!response.ok) throw new Error(await response.text());

            showToast(`主分类已${id ? '更新' : '添加'}`);
            categoryModal.classList.remove('show');
            fetchMainCategories(id ? currentMainPage : 1); // 编辑时留着当前页，添加时去第一页
            // 修复：主分类更新后同时刷新子分类列表，确保主分类选项同步
            fetchSubCategories(currentSubPage);
        } catch (error) {
            showToast(`操作失败: ${error.message}`, 'danger');
        }
    });

    async function editCategory(id) {
        try {
            // 修复：使用专门的API端点获取单个主分类信息
            const response = await fetch(`${mainCategoryApiUrl}${id}/`);
            if (!response.ok) throw new Error('获取主分类信息失败');
            const cat = await response.json();
            
            document.getElementById('modalTitle').textContent = '编辑主分类';
            document.getElementById('categoryId').value = cat.id;
            document.getElementById('categoryName').value = cat.name;
            document.getElementById('categorySlug').value = cat.slug || '';
            document.getElementById('categoryOrder').value = cat.order || 0;
            document.getElementById('categoryStatus').value = cat.is_enabled.toString();
            categoryModal.classList.add('show');
        } catch (error) {
            showToast('获取主分类信息失败: ' + error.message, 'danger');
            console.error('Edit category error:', error);
        }
    }

    async function deleteCategory(id) {
        if (!confirm('确定要删除这个主分类吗？此操作不可撤销。')) return;

        try {
            const response = await fetch(`${mainCategoryApiUrl}${id}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': csrftoken }
            });
            if (response.status !== 204) throw new Error('删除失败');
            showToast('主分类已删除');
            fetchMainCategories(currentMainPage);
            // 修复：删除主分类后同时刷新子分类列表，避免显示不存在的主分类
            fetchSubCategories(currentSubPage);
        } catch (error) {
            showToast(error.message, 'danger');
        }
    }

    // ================= 子分类 CRUD =================
    async function fetchSubCategories(page = 1) {
        try {
            const response = await fetch(`${subCategoryApiUrl}?page=${page}`);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();

            currentSubPage = data.current_page;
            const tableBody = document.getElementById('subCategoryTableBody');
            tableBody.innerHTML = '';

            if(data.items.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">暂无数据</td></tr>`;
            }

            data.items.forEach(cat => {
                const statusBadge = cat.is_enabled ? `<span class="badge badge-success">已启用</span>` : `<span class="badge badge-warning">未启用</span>`;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${cat.id}</td>
                    <td>${cat.parent_name}</td>
                    <td>${cat.name}</td>
                    <td>${cat.slug}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-outline btn-sm" onclick="editSubCategory(${cat.id})"><i class="fas fa-edit"></i> 编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSubCategory(${cat.id})"><i class="fas fa-trash-alt"></i> 删除</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            renderPagination(document.getElementById('subCategoryPagination'), data.current_page, data.total_pages, fetchSubCategories);
        } catch (error) {
            showToast('加载子分类失败', 'danger');
            console.error('Fetch error:', error);
        }
    }

    function updateParentCategoryOptions() {
        const select = document.getElementById('parentCategory');
        select.innerHTML = '<option value="">请选择主分类</option>';
        // 修复：确保主分类缓存存在且有效
        if (mainCategoriesCache && mainCategoriesCache.length > 0) {
            mainCategoriesCache.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        } else {
            // 如果缓存为空，重新获取主分类数据
            fetchMainCategories().then(() => {
                mainCategoriesCache.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            });
        }
    }

    document.getElementById('saveSubCategoryBtn').addEventListener('click', async () => {
        const id = document.getElementById('subCategoryId').value;
        const name = document.getElementById('subCategoryName').value.trim();
        const slug = document.getElementById('subCategorySlug').value.trim();
        const parentId = document.getElementById('parentCategory').value;
        if (!name || !slug || !parentId) return showToast('所有字段均为必填项!', 'danger');

        const url = id ? `${subCategoryApiUrl}${id}/` : subCategoryApiUrl;
        const method = id ? 'PUT' : 'POST';

        const body = JSON.stringify({
            name: name,
            slug: slug,
            parent_id: parseInt(parentId),
            is_enabled: document.getElementById('subCategoryStatus').value === 'true'
        });

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                body: body
            });

            if (!response.ok) throw new Error(await response.text());

            showToast(`子分类已${id ? '更新' : '添加'}`);
            subCategoryModal.classList.remove('show');
            fetchSubCategories(id ? currentSubPage : 1);
        } catch (error) {
            showToast(`操作失败: ${error.message}`, 'danger');
        }
    });

    async function editSubCategory(id) {
        try {
            // 修复：使用专门的API端点获取单个子分类信息
            const response = await fetch(`${subCategoryApiUrl}${id}/`);
            if (!response.ok) throw new Error('获取子分类信息失败');
            const cat = await response.json();
            
            // 先更新主分类选项
            await updateParentCategoryOptions();
            
            // 设置表单数据
            document.getElementById('subModalTitle').textContent = '编辑子分类';
            document.getElementById('subCategoryId').value = cat.id;
            document.getElementById('subCategoryName').value = cat.name;
            document.getElementById('subCategorySlug').value = cat.slug || '';
            document.getElementById('parentCategory').value = cat.parent_id || '';
            document.getElementById('subCategoryStatus').value = cat.is_enabled.toString();
            
            subCategoryModal.classList.add('show');
        } catch (error) {
            showToast('获取子分类信息失败: ' + error.message, 'danger');
            console.error('Edit sub category error:', error);
        }
    }

    async function deleteSubCategory(id) {
        if (!confirm('确定要删除这个子分类吗？')) return;

        try {
            const response = await fetch(`${subCategoryApiUrl}${id}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': csrftoken }
            });
            if (response.status !== 204) throw new Error('删除失败');
            showToast('子分类已删除');
            fetchSubCategories(currentSubPage);
        } catch (error) {
            showToast(error.message, 'danger');
        }
    }

    // ================= TBA切换功能 =================
    let currentTbaType = 'grammar'; // 默认选中语法
    
    // TBA类型配置（用于标识当前选中的类型）
    const tbaTypes = ['grammar', 'data_structure', 'ai_programming', 'project'];
    
    function setupTbaToggle() {
      const tbaButtons = document.querySelectorAll('.tba-btn');
      
      tbaButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          // 移除所有按钮的active状态
          tbaButtons.forEach(b => b.classList.remove('active'));
          // 添加当前按钮的active状态
          btn.classList.add('active');
          
          // 更新当前选中的类型
          currentTbaType = btn.dataset.type;
          
          // 所有TBA类型都加载对应的分类数据
          loadTbaCategoryData(currentTbaType);
        });
      });
    }
    
    // 根据TBA类型加载对应的分类数据
    function loadTbaCategoryData(tbaType) {
      // 项目tab显示空白数据
      if (tbaType === 'project') {
        updateMainCategoryTable([]);
        updateSubCategoryTable([]);
        mainCategoriesCache = []; // 清空缓存
        return;
      }
      
      // 从API获取真实的主分类数据
      fetch('/api/main-categories/', {
        headers: {
          'X-CSRFToken': getCsrfToken(),
          'Content-Type': 'application/json'
        }
      })
        .then(response => response.json())
        .then(data => {
          if (data.items && data.items.length > 0) {
            updateMainCategoryTable(data.items);
            mainCategoriesCache = data.items;
            
            // 获取所有子分类数据
            return fetch('/api/sub-categories/', {
              headers: {
                'X-CSRFToken': getCsrfToken(),
                'Content-Type': 'application/json'
              }
            });
          } else {
            updateMainCategoryTable([]);
            updateSubCategoryTable([]);
            return null;
          }
        })
        .then(response => {
          if (response) {
            return response.json();
          }
          return null;
        })
        .then(subData => {
          if (subData && subData.items && subData.items.length > 0) {
            // 根据TBA类型过滤子分类（这里可以根据需要添加过滤逻辑）
            updateSubCategoryTable(subData.items);
          } else {
            updateSubCategoryTable([]);
          }
        })
        .catch(error => {
          console.error('加载分类数据失败:', error);
          updateMainCategoryTable([]);
          updateSubCategoryTable([]);
        });
    }
    
    // 更新主分类表格
    function updateMainCategoryTable(categories) {
      const tableBody = document.getElementById('mainCategoryTableBody');
      tableBody.innerHTML = '';
      
      if (categories.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">暂无数据</td></tr>`;
        return;
      }
      
      categories.forEach(cat => {
        const statusBadge = cat.is_enabled ? `<span class="badge badge-success">已启用</span>` : `<span class="badge badge-warning">未启用</span>`;
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${cat.id}</td>
          <td>${cat.name}</td>
          <td>${cat.slug}</td>
          <td>${cat.order || 0}</td>
          <td>${statusBadge}</td>
          <td>
            <div class="btn-group">
              <button class="btn btn-outline btn-sm" onclick="editCategory(${cat.id})"><i class="fas fa-edit"></i> 编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})"><i class="fas fa-trash-alt"></i> 删除</button>
            </div>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }
    
    // 更新子分类表格
    function updateSubCategoryTable(categories) {
      const tableBody = document.getElementById('subCategoryTableBody');
      tableBody.innerHTML = '';
      
      if (categories.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">暂无数据</td></tr>`;
        return;
      }
      
      categories.forEach(cat => {
        const statusBadge = cat.is_enabled ? `<span class="badge badge-success">已启用</span>` : `<span class="badge badge-warning">未启用</span>`;
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${cat.id}</td>
          <td>${cat.parent_name}</td>
          <td>${cat.name}</td>
          <td>${cat.slug}</td>
          <td>${statusBadge}</td>
          <td>
            <div class="btn-group">
              <button class="btn btn-outline btn-sm" onclick="editSubCategory(${cat.id})"><i class="fas fa-edit"></i> 编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deleteSubCategory(${cat.id})"><i class="fas fa-trash-alt"></i> 删除</button>
            </div>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }
    
    // ================= 初始加载 =================
    document.addEventListener('DOMContentLoaded', () => {
      setupTbaToggle(); // 初始化TBA切换功能
      // 加载默认的语法分类数据
      loadTbaCategoryData('grammar');
      
      // 确保项目tab初始状态为空
      if (currentTbaType === 'project') {
        updateMainCategoryTable([]);
        updateSubCategoryTable([]);
        mainCategoriesCache = [];
      }
    });
  </script>
</body>
</html>
